/reports:
  get:
    tags:
      - Reports
    summary: Get all reports
    description: Retrieve a list of all reports in the system
    responses:
      '200':
        description: Reports fetched successfully
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReportListResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'

  post:
    tags:
      - Reports
    summary: Create a new report
    description: Add a new report for a user
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CreateReport'
    responses:
      '201':
        description: Report created successfully
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Report'
      '400':
        description: Validation error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'

/reports/{id}:
  get:
    tags:
      - Reports
    summary: Get a report by ID
    description: Retrieve details of a specific report by its ID
    parameters:
      - name: id
        in: path
        required: true
        description: Report ID
        schema:
          type: string
          format: uuid
    responses:
      '200':
        description: Report fetched successfully
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Report'
      '404':
        description: Report not found
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'

  delete:
    tags:
      - Reports
    summary: Delete a report
    description: Remove a report from the system
    parameters:
      - name: id
        in: path
        required: true
        description: Report ID
        schema:
          type: string
          format: uuid
    responses:
      '200':
        description: Report deleted successfully
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApiResponse'
      '404':
        description: Report not found
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
